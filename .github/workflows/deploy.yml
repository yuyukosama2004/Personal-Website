name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy the selected commit or roll back an existing release
        required: true
        default: deploy
        type: choice
        options: [deploy, rollback]
      release:
        description: Commit SHA for rollback; leave empty to use the previous release
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push' || inputs.action == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  deploy:
    if: github.event_name == 'push' || inputs.action == 'deploy'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: dist
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Upload immutable release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          tar -C dist -czf "${GITHUB_SHA}.tar.gz" .
          scp -P "$DEPLOY_PORT" "${GITHUB_SHA}.tar.gz" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/incoming/${GITHUB_SHA}.tar.gz"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "$DEPLOY_PATH/bin/deploy-release '$GITHUB_SHA'"

  rollback:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Switch to an existing release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE: ${{ inputs.release }}
        run: |
          target="${RELEASE:-previous}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "$DEPLOY_PATH/bin/rollback-release '$target'"
