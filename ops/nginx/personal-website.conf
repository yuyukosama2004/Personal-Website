log_format execute42_analytics '$time_iso8601\t$status\t$request_method\t$request_uri\t$http_referer';
log_format execute42_github '$time_iso8601\t$status\t$request_uri\t$http_referer';

server {
    listen 80;
    listen [::]:80;
    server_name www.execute42.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/personal-website/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://www.execute42.top$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.execute42.top;

    root /var/www/personal-website/current;
    index index.html;

    ssl_certificate /etc/nginx/ssl/execute42.top.pem;
    ssl_certificate_key /etc/nginx/ssl/execute42.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Deliberately excludes IP address, cookies and User-Agent.
    access_log /var/log/nginx/personal-website.analytics.log execute42_analytics;
    error_log /var/log/nginx/personal-website.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;

    location = /go/github {
        access_log /var/log/nginx/personal-website-github.log execute42_github;
        return 302 https://github.com/yuyukosama2004;
    }

    location = /go/github/ecc-init {
        access_log /var/log/nginx/personal-website-github.log execute42_github;
        return 302 https://github.com/yuyukosama2004/ecc-init;
    }

    location ~ /\. {
        deny all;
    }

    location ~* ^/(?:_astro|pagefind)/.+\.[a-z0-9]+$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(?:png|jpg|jpeg|webp|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
    }

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
